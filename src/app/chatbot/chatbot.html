<div style="position: fixed; bottom: 20px; right: 20px; z-index: 999; font-family: sans-serif">
  <!-- Nút bấm đơn giản -->
  <button (click)="toggleChat()" style="padding: 10px; cursor: pointer">
    {{ isOpen() ? 'Đóng Chat' : 'Mở Chat 🐟' }}
  </button>

  <!-- Khung Chat -->
  @if (isOpen()) {
    <div
      style="
        width: 300px;
        height: 400px;
        border: 1px solid black;
        background: white;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
      "
    >
      <!-- Tiêu đề -->
      <div style="padding: 10px; background: #eee; border-bottom: 1px solid black">
        <strong>Trợ lý FishStore</strong>
      </div>

      <!-- Nội dung tin nhắn -->
      <div style="flex: 1; overflow-y: auto; padding: 10px">
        @for (msg of messages(); track $index) {
          <div
            [style.text-align]="msg.role === 'user' ? 'right' : 'left'"
            style="margin-bottom: 10px"
          >
            <markdown
              [data]="msg.text"
              [style.background]="msg.role === 'user' ? '#dcf8c6' : '#f1f0f0'"
              class="chat-bubble"
              [class.user-bubble]="msg.role === 'user'"
            ></markdown>
          </div>
        }
        @if (isLoading()) {
          <p style="font-size: 12px; color: gray">Đang trả lời...</p>
        }
      </div>

      <!-- Nhập liệu -->
      <div style="padding: 10px; border-top: 1px solid black; display: flex">
        <input
          [(ngModel)]="userInput"
          (keyup.enter)="sendMessage()"
          placeholder="Hỏi gì đó..."
          style="flex: 1"
        />
        <button (click)="sendMessage()" [disabled]="isLoading()">Gửi</button>
      </div>
    </div>
  }
</div>
